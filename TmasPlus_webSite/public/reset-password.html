<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Restablecer contraseña · TmasPlus</title>
  <style>
    :root {
      --bg: #01060a;
      --card: rgba(4, 39, 58, 0.35);
      --border: rgba(21, 229, 233, 0.25);
      --cyan: #15e5e9;
      --text: #ffffff;
      --muted: #8aa1b1;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: radial-gradient(1200px 600px at 50% -10%, #04273a 0%, var(--bg) 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; min-height: 100dvh;
    }
    .card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }
    .logo {
      width: 84px; height: 84px; margin: 0 auto 18px;
      border-radius: 24px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(21,229,233,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 800; color: var(--cyan);
      letter-spacing: -1px;
    }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0 0 22px; }
    .btn {
      display: block; width: 100%;
      padding: 15px 18px; margin-bottom: 12px;
      background: var(--cyan); color: #001014;
      font-weight: 800; font-size: 14px; letter-spacing: 0.6px;
      border: none; border-radius: 14px;
      text-decoration: none; cursor: pointer;
      box-shadow: 0 6px 18px rgba(21,229,233,0.35);
    }
    .btn.secondary {
      background: transparent; color: var(--cyan);
      border: 1.5px solid var(--border);
      box-shadow: none; font-weight: 700;
    }
    .hint { font-size: 12px; color: var(--muted); margin-top: 18px; }
    .error { color: #E91E63; font-weight: 600; }
    .spin {
      width: 26px; height: 26px; margin: 4px auto 18px;
      border: 3px solid rgba(21,229,233,0.25);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">T+</div>
    <div class="spin" id="spin"></div>
    <h1 id="title">Abriendo la app TmasPlus…</h1>
    <p id="msg">Estamos abriendo tu app para restablecer la contraseña. Si no se abre sola, toca el botón.</p>

    <a class="btn" id="openBtn" href="#">Abrir la app TmasPlus</a>
    <a class="btn secondary" id="storeBtn" href="https://play.google.com/store/apps/details?id=com.releaseunocero" style="display:none">Descargar la app</a>

    <p class="hint" id="hint">
      ¿No tienes la app instalada? Instálala e intenta de nuevo con el mismo enlace del correo.
    </p>
  </div>

  <script>
    (function () {
      var ANDROID_PACKAGE = 'com.releaseunocero';
      var STORE_URL = 'https://play.google.com/store/apps/details?id=' + ANDROID_PACKAGE;

      // Los parámetros pueden venir en el query (?code=... del flujo PKCE) o en
      // el fragmento (#access_token=... del flujo implícito). Preservamos ambos.
      var query = window.location.search ? window.location.search.substring(1) : '';
      var hash = window.location.hash ? window.location.hash.substring(1) : '';

      function parse(str) {
        var out = {};
        if (!str) return out;
        str.split('&').forEach(function (part) {
          if (!part) return;
          var idx = part.indexOf('=');
          var k = idx === -1 ? part : part.substring(0, idx);
          var v = idx === -1 ? '' : part.substring(idx + 1);
          try { out[decodeURIComponent(k)] = decodeURIComponent(v); }
          catch (e) { out[k] = v; }
        });
        return out;
      }

      var params = Object.assign({}, parse(query), parse(hash));
      var ua = navigator.userAgent || '';
      var isAndroid = /Android/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);

      // Si Supabase devolvió un error (enlace expirado/ya usado), mostrarlo.
      if (params.error || params.error_description) {
        document.getElementById('spin').style.display = 'none';
        document.getElementById('title').textContent = 'El enlace no es válido';
        var m = document.getElementById('msg');
        m.className = 'error';
        m.textContent = decodeURIComponent(params.error_description || params.error)
          + '. Solicita un nuevo correo de recuperación desde la app.';
        document.getElementById('openBtn').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
        return;
      }

      // Reconstruye los parámetros relevantes hacia el deep link de la app.
      var keys = ['code', 'access_token', 'refresh_token', 'type', 'token_type', 'expires_in'];
      var qp = keys
        .filter(function (k) { return params[k] != null && params[k] !== ''; })
        .map(function (k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
        .join('&');

      var schemeUrl = 'tmasplus://reset-password' + (qp ? ('?' + qp) : '');

      // En Android, el intent:// es lo más compatible entre navegadores: abre la
      // app por package y, si no está instalada, cae al Play Store.
      var intentUrl = 'intent://reset-password' + (qp ? ('?' + qp) : '')
        + '#Intent;scheme=tmasplus;package=' + ANDROID_PACKAGE
        + ';S.browser_fallback_url=' + encodeURIComponent(STORE_URL) + ';end';

      var openUrl = isAndroid ? intentUrl : schemeUrl;

      var openBtn = document.getElementById('openBtn');
      openBtn.setAttribute('href', openUrl);

      if (isAndroid) {
        document.getElementById('storeBtn').style.display = 'block';
      }

      // Intento automático de abrir la app al cargar.
      var tried = false;
      function tryOpen() {
        if (tried) return;
        tried = true;
        try { window.location.href = openUrl; } catch (e) {}
      }
      // Pequeño delay para que la página pinte antes de saltar.
      setTimeout(tryOpen, 350);

      // Si seguimos en la página tras unos segundos, quita el spinner y deja
      // el botón manual como camino principal (navegadores que bloquean el salto).
      setTimeout(function () {
        var spin = document.getElementById('spin');
        if (spin) spin.style.display = 'none';
        document.getElementById('title').textContent = 'Continúa en la app';
        document.getElementById('msg').textContent =
          'Toca el botón para abrir TmasPlus y crear tu nueva contraseña.';
      }, 2500);

      openBtn.addEventListener('click', function () { tried = false; tryOpen(); });
    })();
  </script>
</body>
</html>
